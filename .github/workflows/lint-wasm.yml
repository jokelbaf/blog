name: Lint Wasm Code

on:
  push:
    branches:
      - master

jobs:
  lint-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Set up Rust
        run: |
          rustup update nightly
          rustup default nightly
          rustup component add clippy

      - name: Run Clippy
        run: cd wasm && cargo clippy --all-targets --all-features -- -D warnings
